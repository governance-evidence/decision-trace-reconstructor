repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check
        language: system
        types_or: [python, pyi]
        args: [src, tests, scripts]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format --check
        language: system
        types_or: [python, pyi]
        args: [src, tests, scripts]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: python -m mypy src
        language: system
        types_or: [python, pyi]
        pass_filenames: false
